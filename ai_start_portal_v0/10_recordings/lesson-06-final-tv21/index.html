<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Урок 06 · Финальная презентация AI Start</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --panel: #181818;
      --line: rgba(255, 255, 255, .14);
      --text: #f6f2ea;
      --muted: rgba(246, 242, 234, .68);
      --accent: #f7c948;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .title {
      min-width: 0;
    }

    .title b {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .04em;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .title span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    a {
      color: inherit;
    }

    .links a {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      text-transform: uppercase;
    }

    .links a.primary {
      border-color: rgba(247, 201, 72, .55);
      color: #15120a;
      background: var(--accent);
    }

    .stage {
      min-height: 0;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      background: #000;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
        gap: 10px;
      }

      .links {
        justify-content: flex-start;
      }
    }
  </style>
</head>
