<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI start portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=JetBrains+Mono:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080706;
      --paper: #f6f1e7;
      --white: #fffdf8;
      --line: #d7cbbb;
      --muted: #7f7669;
      --red: #f42a2a;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans: "Inter", "Helvetica Neue", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(8, 7, 6, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(8, 7, 6, 0.025) 1px, transparent 1px),
        var(--paper);
      background-size: 42px 42px;
      color: var(--black);
      font-family: var(--sans);
    }

    main {
      width: min(520px, calc(100vw - 36px));
      display: grid;
      gap: 24px;
      padding: 34px;
      border: 2px solid var(--black);
      background: rgba(255, 253, 248, 0.88);
      box-shadow: 12px 12px 0 var(--black);
    }

    .mark {
      width: 22px;
      height: 22px;
      background: var(--black);
      box-shadow: 5px 5px 0 var(--red);
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 9vw, 76px);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      text-transform: uppercase;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 56px;
      padding: 0 16px;
      border: 2px solid var(--black);
      border-radius: 0;
      background: var(--white);
      color: var(--black);
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 800;
      outline: none;
    }

    input:focus {
      box-shadow: 5px 5px 0 var(--red);
    }

    button {
      min-height: 56px;
      border: 2px solid var(--black);
      border-radius: 0;
      background: var(--black);
      color: var(--white);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    button:hover {
      background: var(--red);
    }

    .error {
      min-height: 18px;
      color: var(--red);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"></div>
    <div>
      <h1>AI start portal</h1>
      <p>Введите пароль для входа</p>
    </div>
    <form id="login-form">
      <label for="password">password</label>
      <input id="password" name="password" type="password" inputmode="numeric" autocomplete="current-password" autofocus>
      <button type="submit">войти</button>
      <div class="error" id="error" role="alert" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const PASSWORD = "1405";
    const STORAGE_KEY = "ai-start-portal-auth";
    const form = document.querySelector("#login-form");
    const input = document.querySelector("#password");
    const error = document.querySelector("#error");

    if (sessionStorage.getItem(STORAGE_KEY) === "ok") {
      window.location.replace("./portal.html");
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (input.value.trim() === PASSWORD) {
        sessionStorage.setItem(STORAGE_KEY, "ok");
        window.location.href = "./portal.html";
        return;
      }
      error.textContent = "Неверный пароль";
      input.value = "";
      input.focus();
    });
  </script>
</body>
</html>
